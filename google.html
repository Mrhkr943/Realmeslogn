<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login - Email Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
            font-size: 16px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #444;
            padding: 15px 40px;
            border-radius: 50px;
            border: 2px solid #e0e0e0;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            margin-bottom: 30px;
        }

        .google-btn:hover {
            background: #f8f9fa;
            border-color: #4285f4;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(66, 133, 244, 0.2);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
            margin-right: 15px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .feature h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .feature p {
            color: #999;
            font-size: 13px;
        }

        .footer {
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-align: center;
            font-size: 14px;
        }

        .footer a {
            color: white;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .features {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>📧 Email Dashboard</h1>
            <p class="subtitle">Access your Gmail inbox securely with Google login</p>
            
            <a href="/login" class="google-btn">
                <img src="https://www.google.com/favicon.ico" alt="Google icon">
                Sign in with Google
            </a>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">🔒</div>
                    <h3>Secure</h3>
                    <p>OAuth 2.0 authentication</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <h3>Fast</h3>
                    <p>Real-time email access</p>
                </div>
                <div class="feature">
                    <div class="feature-icon">📱</div>
                    <h3>Responsive</h3>
                    <p>Works on all devices</p>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>Secure Gmail access • <a href="#">Privacy</a> • <a href="#">Terms</a></p>
        </div>
    </div>
</body>
</html>
